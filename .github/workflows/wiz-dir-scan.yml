name: Wiz CLI Multi-Tenant Directory Scan
#  comment
on:
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant to scan (leave empty to scan both)'
        required: false
        type: choice
        options:
          - ''
          - advanced
          - stgadvanced
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 */7 * *"

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write

jobs:
  WizCLI-Dir-Scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant: ${{ github.event.inputs.tenant != '' && fromJson(format('["{0}"]', github.event.inputs.tenant)) || fromJson('["advanced", "stgadvanced"]') }}
        include:
          - tenant: stgadvanced
            deploy_env: demo
          - tenant: advanced
            deploy_env: demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Environment Secrets
        id: secrets
        run: |
          if [ "${{ matrix.tenant }}" = "advanced" ]; then
            echo "WIZ_CLIENT_ID=${{ secrets.WIZ_CLIENT_ID_ADVANCED }}" >> $GITHUB_ENV
            echo "WIZ_CLIENT_SECRET=${{ secrets.WIZ_CLIENT_SECRET_ADVANCED }}" >> $GITHUB_ENV
            echo "WIZCLI_URL=${{ secrets.WIZCLI_URL_ADVANCED }}" >> $GITHUB_ENV
          elif [ "${{ matrix.tenant }}" = "stgadvanced" ]; then
            echo "WIZ_CLIENT_ID=${{ secrets.WIZ_CLIENT_ID_STGADVANCED }}" >> $GITHUB_ENV
            echo "WIZ_CLIENT_SECRET=${{ secrets.WIZ_CLIENT_SECRET_STGADVANCED }}" >> $GITHUB_ENV
            echo "WIZCLI_URL=${{ secrets.WIZCLI_URL_STGADVANCED }}" >> $GITHUB_ENV
          fi

      - name: Validate Required Secrets
        run: |
          if [ -z "${{ env.WIZ_CLIENT_ID }}" ]; then
            echo "::error::WIZ_CLIENT_ID secret is not set for tenant ${{ matrix.tenant }}"
            exit 1
          fi
          if [ -z "${{ env.WIZ_CLIENT_SECRET }}" ]; then
            echo "::error::WIZ_CLIENT_SECRET secret is not set for tenant ${{ matrix.tenant }}"
            exit 1
          fi
          if [ -z "${{ env.WIZCLI_URL }}" ]; then
            echo "::error::WIZCLI_URL secret is not set for tenant ${{ matrix.tenant }}"
            exit 1
          fi
          echo "✓ All required secrets are configured for tenant ${{ matrix.tenant }}"

      - name: Get Wiz CLI SHA256
        id: get-sha256
        run: |
          echo "Fetching Wiz CLI SHA256..."
          WIZCLI_SHA256=$(curl -s ${{ env.WIZCLI_URL }}-sha256)
          echo "Wiz CLI SHA256: $WIZCLI_SHA256"
          echo "sha256=$WIZCLI_SHA256" >> $GITHUB_OUTPUT

      - name: Cache Wiz CLI Binary
        uses: actions/cache@v4
        with:
          path: ~/.wiz/wizcli
          key: ${{ runner.os }}-wizcli-${{ steps.get-sha256.outputs.sha256 }}
          restore-keys: |
            ${{ runner.os }}-wizcli-

      - name: Restore Wiz configuration and rules cache
        uses: actions/cache@v4
        with:
          path: ~/.wiz/${{ (matrix.deploy_env == '' || matrix.deploy_env == 'app') && 'clusterFilesCache' || format('{0}_clusterFilesCache', matrix.deploy_env) }}
          key: ${{ runner.os }}-wiz-config-${{ matrix.deploy_env || 'default' }}-${{ matrix.tenant }}
          restore-keys: |
            ${{ runner.os }}-wiz-config-${{ matrix.deploy_env || 'default' }}-${{ matrix.tenant }}
            ${{ runner.os }}-wiz-config-${{ matrix.deploy_env || 'default' }}-
            ${{ runner.os }}-wiz-config-

      - name: Install Wiz CLI
        run: |
          EXPECTED_SHA256="${{ steps.get-sha256.outputs.sha256 }}"
          
          if [ -f ~/.wiz/wizcli ]; then
            ACTUAL_SHA256=$(sha256sum ~/.wiz/wizcli | cut -d' ' -f1)
            if [ "$ACTUAL_SHA256" = "$EXPECTED_SHA256" ]; then
              echo "✓ Using cached Wiz CLI (SHA256 verified)"
              echo "WIZCLI_PATH=$HOME/.wiz/wizcli" >> $GITHUB_ENV
              exit 0
            else
              echo "Cache SHA256 mismatch, re-downloading..."
            fi
          fi
          
          echo "Downloading Wiz CLI..."
          mkdir -p ~/.wiz
          curl -sL -o ~/.wiz/wizcli ${{ env.WIZCLI_URL }}
          chmod +x ~/.wiz/wizcli
          
          # Verify download
          DOWNLOADED_SHA256=$(sha256sum ~/.wiz/wizcli | cut -d' ' -f1)
          if [ "$DOWNLOADED_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::Downloaded Wiz CLI SHA256 mismatch!"
            echo "::error::Expected: $EXPECTED_SHA256"
            echo "::error::Got: $DOWNLOADED_SHA256"
            exit 1
          fi
          
          echo "✓ Wiz CLI downloaded and verified"
          echo "WIZCLI_PATH=$HOME/.wiz/wizcli" >> $GITHUB_ENV

      - name: Authenticate Wiz CLI
        run: |
          ${{ env.WIZCLI_PATH }} auth --id "${{ env.WIZ_CLIENT_ID }}" --secret "${{ env.WIZ_CLIENT_SECRET }}"
          echo "✓ Authenticated with Wiz (${{ matrix.tenant }})"

      - name: Run Wiz Security Scan
        id: scan
        run: |
          ${{ env.WIZCLI_PATH }} dir scan "." \
            --name "${{ github.repository }}-${{ matrix.tenant }}-${{ github.run_id }}" \
            --tag github_action_run_id=${{ github.run_id }} \
            --tag tenant=${{ matrix.tenant }} \
            --tag deploy_env=${{ matrix.deploy_env }} \
            --tag github_repo=${{ github.repository }} \
            --tag github_sha=${{ github.sha }} \
            -o human \
            --sarif-output-file "${{ matrix.tenant }}-${{ github.run_id }}.sarif" \
            2>&1 | tee scan-output-${{ matrix.tenant }}.txt
          
          SCAN_EXIT_CODE=${PIPESTATUS[0]}
          echo "scan_exit_code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT
        env:
          WIZ_ENV: ${{ matrix.deploy_env }}
        continue-on-error: true

      - name: Get Cluster Files Cache SHA256
        if: always()
        id: get-cluster-sha256
        run: |
          echo "Checking for cluster files cache after scan..."
          if [ -z "${{ matrix.deploy_env }}" ] || [ "${{ matrix.deploy_env }}" = "app" ]; then
            CACHE_DIR="$HOME/.wiz/clusterFilesCache"
          else
            CACHE_DIR="$HOME/.wiz/${{ matrix.deploy_env }}_clusterFilesCache"
          fi
          echo "Expected cache directory: $CACHE_DIR"

          if [ -d "$CACHE_DIR" ] && [ -f "$CACHE_DIR/clusterFiles.tar.gz" ]; then
            CLUSTER_SHA256=$(sha256sum "$CACHE_DIR/clusterFiles.tar.gz" | cut -d' ' -f1)
            echo "Cluster files SHA256: $CLUSTER_SHA256"
            echo "sha256=$CLUSTER_SHA256" >> $GITHUB_OUTPUT
            echo "cache_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No cluster files cache found after scan"
            echo "sha256=no-cache" >> $GITHUB_OUTPUT
            echo "cache_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Wiz configuration and rules
        if: always() && steps.get-cluster-sha256.outputs.cache_exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.wiz/${{ matrix.deploy_env }}_clusterFilesCache
          key: ${{ runner.os }}-wiz-config-${{ matrix.deploy_env }}-${{ matrix.tenant }}
          restore-keys: |
            ${{ runner.os }}-wiz-config-${{ matrix.deploy_env }}-${{ matrix.tenant }}
            ${{ runner.os }}-wiz-config-${{ matrix.deploy_env }}-
            ${{ runner.os }}-wiz-config-

      - name: Upload SARIF file
        if: always() && hashFiles(format('{0}-{1}.sarif', matrix.tenant, github.run_id)) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "${{ matrix.tenant }}-${{ github.run_id }}.sarif"
          category: wiz-${{ matrix.tenant }}
        continue-on-error: true

      - name: Upload Scan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-${{ matrix.tenant }}-${{ github.run_id }}
          path: |
            ${{ matrix.tenant }}-${{ github.run_id }}.sarif
            scan-output-${{ matrix.tenant }}.txt
          retention-days: 30
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tenant = '${{ matrix.tenant }}';
            
            // Read scan output
            let scanOutput = '';
            try {
              scanOutput = fs.readFileSync(`scan-output-${tenant}.txt`, 'utf8');
            } catch (e) {
              scanOutput = 'No scan output available';
            }
            
            const exitCode = '${{ steps.scan.outputs.scan_exit_code }}' || 'unknown';
            const statusEmoji = exitCode === '0' ? '✅' : '⚠️';
            const statusText = exitCode === '0' ? 'Passed' : 'Issues Found';
            
            // Truncate output if too long
            const maxLen = 50000;
            const truncatedOutput = scanOutput.length > maxLen 
              ? scanOutput.substring(0, maxLen) + '\n\n... (output truncated)'
              : scanOutput;
            
            const body = `## ${statusEmoji} Wiz Security Scan: \`${tenant}\` - ${statusText}
            
            ### Scan Details
            | Property | Value |
            |----------|-------|
            | Tenant | \`${tenant}\` |
            | Repository | \`${{ github.repository }}\` |
            | Commit | \`${{ github.sha }}\` |
            | Branch | \`${{ github.head_ref }}\` |
            
            <details>
            <summary>📋 Full Scan Output</summary>
            
            \`\`\`
            ${truncatedOutput}
            \`\`\`
            
            </details>
            
            ---
            *View detailed findings in the [Security tab](/${{ github.repository }}/security/code-scanning?query=tool:wiz-${tenant})*
            `;
            
            // Find existing comment for this tenant to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const wizComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes(`Wiz Security Scan: \`${tenant}\``)
            );
            
            if (wizComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: wizComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }